<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plothole</title>
  <style>
    body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 32px 0; min-height: 100vh; gap: 24px; font-family: monospace; color: #eee; }
    canvas { background: white; border-radius: 4px; }
    .panel { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .panel h2 { margin: 0; font-size: 14px; font-weight: normal; color: #888; letter-spacing: 1px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; max-width: 800px; justify-content: center; }
    input, select, button { font-family: monospace; font-size: 14px; padding: 4px 8px; border-radius: 3px; border: 1px solid #555; background: #2a2a2a; color: #eee; }
    button { cursor: pointer; background: #333; }
    button:hover { background: #444; }
    label { font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 4px; }
    .slider { display: flex; flex-direction: column; gap: 2px; align-items: flex-start; }
    .slider input[type=range] { width: 140px; }
    .slider .val { color: #ccc; font-size: 11px; }
    hr { border: none; border-top: 1px solid #333; width: 100%; max-width: 800px; }
  </style>
</head>
<body>
  <div class="panel">
    <h2>TEXT ANIMATION</h2>
    <canvas id="canvas" width="800" height="500"></canvas>
    <div class="controls">
      <label>Text: <input id="text" value="Hello World" size="20"></label>
      <label>Font: <select id="font"></select></label>
      <label>TTF file: <input id="ttf" type="file" accept=".ttf,.otf,.ttc"></label>
      <label>Speed: <input id="duration" type="number" value="10" min="1" max="300" step="1"> s</label>
      <button id="go">Render</button>
    </div>
  </div>

  <hr>

  <div class="panel">
    <h2>TEXT LAYOUT</h2>
    <canvas id="layout-canvas" width="800" height="500"></canvas>
    <textarea id="layout-src" spellcheck="false" style="width:780px;height:140px;font-family:monospace;font-size:12px;background:#222;color:#ddd;border:1px solid #444;border-radius:3px;padding:8px;resize:vertical;"></textarea>
    <div class="controls">
      <label>Speed: <input id="layout-duration" type="number" value="10" min="1" max="300" step="1"> s</label>
      <button id="layout-go">Animate</button>
      <button id="layout-show-all">Show Complete</button>
    </div>
  </div>

  <hr>

  <div class="panel">
    <h2>3D SCENE</h2>
    <canvas id="scene-canvas" width="800" height="600"></canvas>
    <div class="controls">
      <label>Preset: <select id="scene-preset"></select></label>
      <label>Cubes: <input id="scene-count" type="number" value="200" min="1" max="2000" step="50" style="width: 70px;"></label>
      <label>Custom SVG cube: <input id="custom-svg" type="file" accept=".svg"></label>
      <button id="scene-show-plot">Show Plot</button>
    </div>
    <div class="controls">
      <label class="slider">Azimuth <span class="val" id="azimuth-val">35°</span>
        <input id="azimuth" type="range" min="0" max="360" step="1" value="35"></label>
      <label class="slider">Elevation <span class="val" id="elevation-val">25°</span>
        <input id="elevation" type="range" min="-89" max="89" step="1" value="25"></label>
      <label class="slider">FOV <span class="val" id="fov-val">0°</span>
        <input id="fov" type="range" min="0" max="120" step="1" value="0"></label>
      <label class="slider">Distance <span class="val" id="distance-val">20</span>
        <input id="distance" type="range" min="2" max="60" step="0.5" value="20"></label>
    </div>
    <div class="controls">
      <label>Max vel <input id="max-vel"   type="number" value="500"  min="50"  max="5000" step="50"  style="width: 70px;"></label>
      <label>Accel <input id="accel"     type="number" value="2000" min="100" max="10000" step="100" style="width: 70px;"></label>
      <label>Cornering <input id="cornering" type="number" value="1.0"  min="0.1" max="10"   step="0.1" style="width: 60px;"></label>
      <label>Pen-up speed× <input id="pen-up" type="number" value="1.0" min="1" max="10" step="0.5" style="width: 50px;"></label>
    </div>
    <div class="controls" style="font-size: 11px; color: #888;">
      <span id="scene-stats">—</span>
      <span id="plot-stats" style="margin-left: 12px;"></span>
    </div>
  </div>

  <script type="module">
    import init, { PlotRenderer, listFonts, listScene3dPresets, Scene3d } from './pkg/plothole.js?v=5';
    await init('./pkg/plothole_bg.wasm?v=5');

    // Parse an SVG file into normalized [0,1]² polylines using the browser's path API.
    async function parseSvgToPaths(file, samplePixelSpacing = 1.5) {
      const text = await file.text();
      const doc  = new DOMParser().parseFromString(text, 'image/svg+xml');
      const parserErr = doc.querySelector('parsererror');
      if (parserErr) throw new Error('Invalid SVG: ' + parserErr.textContent.slice(0, 200));
      const root = doc.documentElement;
      if (!root || root.tagName.toLowerCase() !== 'svg') throw new Error('File is not an SVG');
      root.style.position = 'absolute';
      root.style.visibility = 'hidden';
      document.body.appendChild(root);
      try {
        const polylines = [];
        const elems = root.querySelectorAll('path, line, polyline, polygon');
        for (const el of elems) {
          let d = null;
          const tag = el.tagName.toLowerCase();
          if (tag === 'path') {
            d = el.getAttribute('d');
          } else if (tag === 'line') {
            d = `M${el.getAttribute('x1')||0},${el.getAttribute('y1')||0} L${el.getAttribute('x2')||0},${el.getAttribute('y2')||0}`;
          } else if (tag === 'polyline' || tag === 'polygon') {
            const pts = (el.getAttribute('points') || '').trim().split(/[\s,]+/).map(parseFloat);
            if (pts.length < 4) continue;
            d = `M${pts[0]},${pts[1]}`;
            for (let i = 2; i < pts.length; i += 2) d += ` L${pts[i]},${pts[i+1]}`;
            if (tag === 'polygon') d += ' Z';
          }
          if (!d) continue;
          const tmp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          tmp.setAttribute('d', d);
          root.appendChild(tmp);
          const len = tmp.getTotalLength?.() || 0;
          if (len <= 0) { tmp.remove(); continue; }
          const samples = Math.max(2, Math.ceil(len / samplePixelSpacing));
          const poly = [];
          for (let i = 0; i <= samples; i++) {
            const p = tmp.getPointAtLength(len * i / samples);
            poly.push([p.x, p.y]);
          }
          polylines.push(poly);
          tmp.remove();
        }
        if (polylines.length === 0) return null;
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (const p of polylines) for (const [x, y] of p) {
          if (x < minX) minX = x; if (x > maxX) maxX = x;
          if (y < minY) minY = y; if (y > maxY) maxY = y;
        }
        const w  = (maxX - minX) || 1;
        const h  = (maxY - minY) || 1;
        const s  = 0.85 / Math.max(w, h);
        const cx = (minX + maxX) / 2;
        const cy = (minY + maxY) / 2;
        for (const p of polylines) for (const pt of p) {
          pt[0] = 0.5 + (pt[0] - cx) * s;
          pt[1] = 0.5 - (pt[1] - cy) * s; // SVG y-down → texture y-up so it reads right
        }
        return polylines;
      } finally {
        root.remove();
      }
    }

    function flattenPolylines(polylines) {
      // Drop any polyline with fewer than 2 points or any non-finite coord.
      const valid = polylines.filter(p =>
        p.length >= 2 && p.every(([x, y]) => Number.isFinite(x) && Number.isFinite(y))
      );
      if (valid.length === 0) return null;
      const lengths = new Uint32Array(valid.length);
      let total = 0;
      valid.forEach((p, i) => { lengths[i] = p.length; total += p.length; });
      const flat = new Float64Array(total * 2);
      let k = 0;
      for (const p of valid) for (const [x, y] of p) { flat[k++] = x; flat[k++] = y; }
      return { flat, lengths };
    }

    // Populate font dropdown.
    const fontSel = document.getElementById('font');
    const defaultFont = 'FUTURAL';
    {
      const opt = document.createElement('option');
      opt.value = 'IOSEVKA';
      opt.textContent = 'IOSEVKA (skeleton)';
      fontSel.appendChild(opt);
    }
    for (const name of listFonts()) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      if (name === defaultFont) opt.selected = true;
      fontSel.appendChild(opt);
    }

    const canvas = document.getElementById('canvas');
    let renderer = null;
    let animStart = null;
    let animDuration = 10;
    let rafId = null;

    function frame(ts) {
      if (!animStart) animStart = ts;
      const t = Math.min((ts - animStart) / 1000 * (renderer.duration() / animDuration), renderer.duration());
      renderer.renderFrame(canvas, t);
      if (t < renderer.duration()) {
        rafId = requestAnimationFrame(frame);
      }
    }

    function startAnim() {
      if (rafId) cancelAnimationFrame(rafId);
      animStart = null;
      animDuration = parseFloat(document.getElementById('duration').value) || 10;
      rafId = requestAnimationFrame(frame);
    }

    document.getElementById('go').addEventListener('click', async () => {
      const text = document.getElementById('text').value || 'Hello';
      const fontName = document.getElementById('font').value;
      const ttfInput = document.getElementById('ttf');
      const duration = parseFloat(document.getElementById('duration').value) || 10;

      try {
        if (ttfInput.files.length > 0) {
          const buf = await ttfInput.files[0].arrayBuffer();
          renderer = PlotRenderer.fromTtf(new Uint8Array(buf), text, 0, '[]', 128.0, 1.5);
        } else if (fontName === 'IOSEVKA') {
          renderer = PlotRenderer.fromIosevka(text, 30.0);
        } else {
          renderer = PlotRenderer.fromHershey(text, fontName || 'FUTURAL', 1.0);
        }
        animDuration = duration;
        startAnim();
      } catch (e) {
        alert('Error: ' + e);
      }
    });

    // Render immediately on load.
    try {
      renderer = PlotRenderer.fromHershey('Hello World', 'FUTURAL', 1.0);
      startAnim();
    } catch (e) {
      console.error(e);
    }

    // ─── Text layout ──────────────────────────────────────────────────────
    // 1 plot unit = 0.3528 mm  →  1 mm ≈ 2.835 units, 1 inch ≈ 72 units
    const LAYOUT_DEFAULT = `{
  paper: {width: "3.5 inch", height: "2 inch"},

  blocks: [
    {
      pos: [0, 0], width: "15mm", min_height: "2 inch",
      border: {right: true},
      fill: {type: "waves", spacing: "4mm", amplitude: "1.5mm", wavelength: "12mm", phase_step: 60}
    },
    {
      pos: ["15mm", 0], width: "100%",
      padding: "4mm",
      text: [
        {font: "FUTURAL", size: 1.1,  text: "WILD MERCURY",       pos: [0, 0],  halign: "left", valign: "top"},
        {font: "FUTURAL", size: 0.85, text: "salt and compass",   pos: [0, 28], halign: "left", valign: "top"},
        {font: "FUTURAL", size: 0.75, text: "forty leagues west", pos: [0, 48], halign: "left", valign: "top"}
      ]
    }
  ]
}`;
    document.getElementById('layout-src').value = LAYOUT_DEFAULT;

    // Normalise YAML flow-style (unquoted keys) into valid JSON.
    function normalizeToJson(src) {
      try { return JSON.parse(src); } catch (_) {}
      const fixed = src.replace(/([{,[\s])(\w[\w-]*)(\s*):/g, '$1"$2"$3:');
      return JSON.parse(fixed);
    }

    const layoutCanvas = document.getElementById('layout-canvas');
    let layoutRenderer = null;
    let layoutRaf      = null;
    let layoutStart    = null;

    function frameLayout(ts) {
      if (!layoutStart) layoutStart = ts;
      const dur  = layoutRenderer.duration();
      const secs = parseFloat(document.getElementById('layout-duration').value) || 10;
      const t    = Math.min((ts - layoutStart) / 1000 * (dur / secs), dur);
      layoutRenderer.renderFrame(layoutCanvas, t);
      if (t < dur) layoutRaf = requestAnimationFrame(frameLayout);
    }

    function stopLayoutAnim() {
      if (layoutRaf) { cancelAnimationFrame(layoutRaf); layoutRaf = null; }
    }

    function buildLayoutRenderer() {
      const src  = document.getElementById('layout-src').value;
      const data = normalizeToJson(src);
      const json = JSON.stringify(data);
      stopLayoutAnim();
      if (layoutRenderer) { layoutRenderer.free(); layoutRenderer = null; }
      layoutRenderer = PlotRenderer.fromTextLayout(json);
      layoutStart = null;
    }

    document.getElementById('layout-go').addEventListener('click', () => {
      try {
        buildLayoutRenderer();
        layoutRaf = requestAnimationFrame(frameLayout);
      } catch (e) { alert('Error: ' + e); }
    });

    document.getElementById('layout-show-all').addEventListener('click', () => {
      try {
        buildLayoutRenderer();
        layoutRenderer.renderFrame(layoutCanvas, layoutRenderer.duration());
      } catch (e) { alert('Error: ' + e); }
    });

    // Show complete on load.
    try { buildLayoutRenderer(); layoutRenderer.renderFrame(layoutCanvas, layoutRenderer.duration()); } catch (e) { console.error(e); }

    // ─── 3D scene ──────────────────────────────────────────────────────────
    const sceneCanvas = document.getElementById('scene-canvas');
    const presetSel   = document.getElementById('scene-preset');
    const countInp    = document.getElementById('scene-count');
    const azInp       = document.getElementById('azimuth');
    const elInp       = document.getElementById('elevation');
    const fovInp      = document.getElementById('fov');
    const distInp     = document.getElementById('distance');
    const stats       = document.getElementById('scene-stats');
    const azVal       = document.getElementById('azimuth-val');
    const elVal       = document.getElementById('elevation-val');
    const fovVal      = document.getElementById('fov-val');
    const distVal     = document.getElementById('distance-val');

    for (const name of listScene3dPresets()) {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      if (name === 'showcase') opt.selected = true;
      presetSel.appendChild(opt);
    }

    // Scene cache: only rebuilt when preset/count changes (or on custom SVG upload).
    let sceneCtx  = null;
    let cachedKey = '';
    let customCtx = null; // populated when the user uploads an SVG
    function ensureScene() {
      if (customCtx) {
        if (sceneCtx !== customCtx) { sceneCtx = customCtx; cachedKey = '__custom__'; }
        return;
      }
      const cnt = Math.max(1, parseInt(countInp.value) || 200);
      const key = presetSel.value + '|' + cnt;
      if (key !== cachedKey) {
        if (sceneCtx && sceneCtx !== customCtx) sceneCtx.free();
        sceneCtx = new Scene3d(presetSel.value, cnt);
        cachedKey = key;
      }
    }
    document.getElementById('custom-svg').addEventListener('change', async (ev) => {
      const file = ev.target.files[0];
      if (!file) return;
      try {
        const polys = await parseSvgToPaths(file);
        if (!polys || polys.length === 0) { stats.textContent = 'No paths found in SVG'; return; }
        const result = flattenPolylines(polys);
        if (!result) { stats.textContent = 'SVG contained no usable paths'; return; }
        const { flat, lengths } = result;

        // Free everything before allocating the new scene. sceneCtx and customCtx may
        // alias the same wasm pointer; never call free() twice on it.
        if (sceneCtx && sceneCtx !== customCtx) sceneCtx.free();
        if (customCtx) customCtx.free();
        sceneCtx = null;
        customCtx = null;

        customCtx = Scene3d.customTexturedCube(flat, lengths);
        sceneCtx  = customCtx;
        cachedKey = '__custom__';
        scheduleRender();
      } catch (e) {
        stats.textContent = 'SVG parse error: ' + e;
      }
    });
    presetSel.addEventListener('change', () => {
      // Switching preset clears the custom override.
      if (customCtx) { customCtx.free(); customCtx = null; cachedKey = ''; sceneCtx = null; }
      document.getElementById('custom-svg').value = '';
    });

    let pending = false;
    function scheduleRender() {
      if (pending) return;
      pending = true;
      requestAnimationFrame(() => {
        pending = false;
        const az  = parseFloat(azInp.value);
        const el  = parseFloat(elInp.value);
        const fov = parseFloat(fovInp.value);
        const d   = parseFloat(distInp.value);
        azVal.textContent   = az.toFixed(0) + '°';
        elVal.textContent   = el.toFixed(0) + '°';
        fovVal.textContent  = fov.toFixed(0) + '°';
        distVal.textContent = d.toFixed(1);
        const t0 = performance.now();
        try {
          ensureScene();
          const n = sceneCtx.render(sceneCanvas, az, el, fov, d);
          const ms = (performance.now() - t0).toFixed(1);
          stats.textContent = `${n} segments · ${ms} ms`;
        } catch (e) {
          stats.textContent = 'Error: ' + e;
        }
      });
    }

    for (const el of [presetSel, countInp, azInp, elInp, fovInp, distInp]) {
      el.addEventListener('input', () => {
        // Cancel any in-progress plot animation when the user touches a control.
        if (scenePlotRaf) { cancelAnimationFrame(scenePlotRaf); scenePlotRaf = null; }
        if (scenePlotRenderer) { scenePlotRenderer.free(); scenePlotRenderer = null; }
        scheduleRender();
      });
    }
    scheduleRender();

    // ─── 3D scene plot animation ──────────────────────────────────────────
    let scenePlotRenderer = null;
    let scenePlotStart    = null;
    let scenePlotRaf      = null;
    const PLOT_PLAYBACK_SECONDS = 12;
    function frameScenePlot(ts) {
      if (!scenePlotStart) scenePlotStart = ts;
      const dur     = scenePlotRenderer.duration();
      const elapsed = (ts - scenePlotStart) / 1000;
      const t       = Math.min(elapsed * (dur / PLOT_PLAYBACK_SECONDS), dur);
      scenePlotRenderer.renderFrame(sceneCanvas, t);
      if (t < dur) {
        scenePlotRaf = requestAnimationFrame(frameScenePlot);
      } else {
        scenePlotRaf = null;
      }
    }
    const maxVelInp    = document.getElementById('max-vel');
    const accelInp     = document.getElementById('accel');
    const corneringInp = document.getElementById('cornering');
    const penUpInp     = document.getElementById('pen-up');
    const plotStats    = document.getElementById('plot-stats');
    document.getElementById('scene-show-plot').addEventListener('click', () => {
      ensureScene();
      const az  = parseFloat(azInp.value);
      const el  = parseFloat(elInp.value);
      const fov = parseFloat(fovInp.value);
      const d   = parseFloat(distInp.value);
      const vmax  = parseFloat(maxVelInp.value)    || 500;
      const accel = parseFloat(accelInp.value)     || 2000;
      const corn  = parseFloat(corneringInp.value) || 1.0;
      const upMul = parseFloat(penUpInp.value)     || 1.0;
      if (scenePlotRaf) { cancelAnimationFrame(scenePlotRaf); }
      if (scenePlotRenderer) { scenePlotRenderer.free(); }
      const t0 = performance.now();
      scenePlotRenderer = sceneCtx.toPlotRenderer(az, el, fov, d, vmax, accel, corn, upMul);
      const planMs   = performance.now() - t0;
      const plotSecs = scenePlotRenderer.duration();
      plotStats.textContent = `Plot: ${plotSecs.toFixed(1)} s (${(plotSecs / 60).toFixed(2)} min) · plan ${planMs.toFixed(0)} ms`;
      scenePlotStart = null;
      scenePlotRaf = requestAnimationFrame(frameScenePlot);
    });
    // Re-estimate when motion params change but a plot has already been built.
    for (const el of [maxVelInp, accelInp, corneringInp, penUpInp]) {
      el.addEventListener('input', () => {
        // Don't auto-replan — user clicks Show Plot to refresh.
        plotStats.textContent = '(motion params changed — click Show Plot to update)';
      });
    }
  </script>
</body>
</html>
